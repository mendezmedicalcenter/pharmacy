<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- ============ APP IDENTITY ============ -->
  <title>Mendez Pharmacy</title>
  <meta name="apple-mobile-web-app-title" content="Mendez Pharmacy">
  <meta name="application-name" content="Mendez Pharmacy">
  <meta name="description" content="Mendez Medical Center — Pharmacy Dashboard">

  <!-- iOS / iPadOS standalone-mode metadata. When the user "Adds to Home
       Screen", the icon below shows up on the home screen and the app
       launches full-screen with no Safari toolbar. -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0a2a6e">
  <meta name="mobile-web-app-capable" content="yes">

  <!-- ============ ICONS ============
       The same logo.png file is used for every icon size. Browsers and
       iOS will pick whichever fits their context best. -->
  <link rel="icon" type="image/png" href="logo.png">
  <link rel="shortcut icon" type="image/png" href="logo.png">
  <link rel="apple-touch-icon" sizes="180x180" href="logo.png">
  <link rel="apple-touch-icon" sizes="167x167" href="logo.png">
  <link rel="apple-touch-icon" sizes="152x152" href="logo.png">
  <link rel="apple-touch-icon" sizes="120x120" href="logo.png">
  <link rel="apple-touch-icon" href="logo.png">

  <!-- Web app manifest — required for "Install as app" on Chrome/Edge -->
  <link rel="manifest" href="manifest.json">

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #0a2a6e 0%, #061a4a 100%);
      color: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
    }
    .splash {
      max-width: 360px;
    }
    .splash img {
      width: 120px;
      height: 120px;
      object-fit: contain;
      border-radius: 24px;
      background: #ffffff;
      padding: 14px;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.25);
      margin-bottom: 24px;
    }
    .splash h1 {
      font-size: 22px;
      font-weight: 800;
      letter-spacing: -0.3px;
      margin-bottom: 6px;
    }
    .splash p {
      font-size: 14px;
      color: rgba(255, 255, 255, 0.75);
      margin-bottom: 22px;
    }
    .spinner {
      display: inline-block;
      width: 28px;
      height: 28px;
      border: 3px solid rgba(255, 255, 255, 0.2);
      border-top-color: #f5a821;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .manual-link {
      display: inline-block;
      margin-top: 20px;
      padding: 10px 18px;
      background: rgba(255, 255, 255, 0.15);
      border: 1px solid rgba(255, 255, 255, 0.3);
      border-radius: 8px;
      color: #fff;
      font-size: 13px;
      font-weight: 600;
      text-decoration: none;
      transition: background 0.15s;
    }
    .manual-link:hover {
      background: rgba(255, 255, 255, 0.25);
    }
  </style>
</head>
<body>
  <div class="splash">
    <img src="logo.png" alt="Mendez Medical Center">
    <h1>Mendez Pharmacy</h1>
    <p>Loading dashboard…</p>
    <div class="spinner"></div>
    <br>
    <a class="manual-link" id="manualLink" href="#">Tap here if not redirected</a>
  </div>

  <script>
    // ============ APPS SCRIPT REDIRECT ============
    // When this page loads, redirect to the live Pharmacy Dashboard
    // (deployed Apps Script web app). Replace the URL below with the
    // URL from your Apps Script "Manage deployments" panel.
    var DASHBOARD_URL = "https://script.google.com/macros/s/AKfycbyEJsoeIoZfbtKC6vPOjZnTUaLFDr4rwM478XKXuhAyNK4-B0O0snQLzAWO5n6UhH7Zcw/exec";

    // Set the manual fallback link in case auto-redirect is blocked
    document.getElementById('manualLink').setAttribute('href', DASHBOARD_URL);

    // Auto-redirect after a brief moment so the splash screen registers
    // (helps iOS pick up the icon when added to home screen)
    setTimeout(function () {
      window.location.replace(DASHBOARD_URL);
    }, 400);
  </script>
</body>
</html>
